<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Aplicación Django{% endblock %}</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400|Roboto+Slab:300,400">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
          integrity="sha384-LtrjvnR4/Jkk+1j6eE9eUaoA7tUOH5z7rG1r9H7r5n9E4lV9zzTtmI3UksdQRVVO"
          crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.digital.gob.cl/framework/css/gob.cl.css" type="text/css"/>

    {% load static %}
    <link rel="stylesheet" href="{% static 'solicitudesF/css/styles.css' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="{% url 'solicitudesF:home' %}">
                <img src="https://cdn.digital.gob.cl/framework/img/gob-header.svg"
                     alt="Gobierno de Chile" height="40">
            </a>

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Menú de navegación">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">


                    <li class="nav-item">
                        <a class="nav-link" href="https://www.chileatiende.gob.cl/" target="_blank">
                            <i class="bi bi-info-circle"></i> Chile Atiende
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-light text-center py-3 mt-4 border-top">
        <p class="mb-0 small text-muted">
            © {{ year|default:2025 }} Gobierno de Chile · Desarrollado con Django
        </p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" crossorigin="anonymous"></script>

    <script src="https://cdn.digital.gob.cl/framework/js/gob.cl.js"></script>
    <script src="https://cdn.digital.gob.cl/framework/js/main.js"></script>
</body>
</html>
